
name: CI Pipeline

on:
  push:
  pull_request:

jobs:
  # gitleaks:
  #   runs-on: ubuntu-latest
  #   steps:
  #     - name: Checkout code
  #       uses: actions/checkout@v4
  #     - name: Run Gitleaks to check for secrets
  #       uses: gitleaks/gitleaks-action@v2
  #       with:
  #         fail: true
  #         verbose: true
  #         report-format: sarif
  #         report-path: gitleaks.sarif
  #       continue-on-error: false
  build-and-test:
    runs-on: ubuntu-latest
    # needs: gitleaks
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      - name: Maven clean
        run: mvn clean
        working-directory: code
      - name: Maven compile
        run: mvn compile
        working-directory: code
      - name: Maven test
        run: mvn test
        working-directory: code
        - name: Upload Maven JUnit reports
          uses: actions/upload-artifact@v4
          with:
            name: maven-junit-reports
            path: code/target/surefire-reports/*.xml
        - name: Publish Maven JUnit results
          uses: dorny/test-reporter@v1
          with:
            name: Maven Tests
            path: code/target/surefire-reports/*.xml
            reporter: java-junit
      - name: Start Spring Boot with JaCoCo agent
        run: |
          nohup mvn spring-boot:run -Dspring-boot.run.jvmArguments="-javaagent:${HOME}/.m2/repository/org/jacoco/org.jacoco.agent/0.8.14/org.jacoco.agent-0.8.14-runtime.jar=destfile=target/jacoco-it.exec" > spring.log 2>&1 &
          for i in {1..60}; do
            if grep -q 'Started App' spring.log; then
              echo 'Spring Boot started.'
              break
            fi
            sleep 1
          done
          if ! grep -q 'Started App' spring.log; then
            echo 'Spring Boot did not start in time.'
            cat spring.log
            exit 1
          fi
        working-directory: code
      - name: Run Karate tests
        env:
          API_BASE_URL: http://host.docker.internal:8080
        run: |
            docker run --rm --entrypoint= \
              -e API_BASE_URL="$API_BASE_URL" \
              -v "${{ github.workspace }}/code/karate-tests:/src" \
              -v "${{ github.workspace }}/code/karate-tests/target:/src/target" \
              karatelabs/karate-chrome \
              java -jar karate.jar --threads=128 --format=json,cucumber:json,junit:xml --tags ~@wip --tags ~@ignore .
        working-directory: code/karate-tests
      - name: Upload Karate JUnit reports
        uses: actions/upload-artifact@v4
        with:
          name: karate-junit-reports
          path: code/karate-tests/target/karate-reports/*.xml
      - name: Publish Karate JUnit results
        uses: dorny/test-reporter@v1
        with:
          name: Karate Tests
          path: code/karate-tests/target/karate-reports/*.xml
          reporter: java-junit
      - name: Stop Spring Boot
        run: pkill -f 'org.springframework.boot.loader.JarLauncher' || pkill -f 'spring-boot:run' || true
      - name: Merge JaCoCo exec files
        run: mvn jacoco:merge@merge
        working-directory: code
      - name: Generate JaCoCo report
        run: mvn jacoco:report -Djacoco.dataFile=target/jacoco-merged.exec
        working-directory: code

  native-and-docker:
    runs-on: ubuntu-latest
    needs: build-and-test
    # if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      - name: Build native image
        run: mvn package -Pnative
        working-directory: code
      - name: Build Docker image
        run: docker build -t myorg/myimage:latest .
        working-directory: code


