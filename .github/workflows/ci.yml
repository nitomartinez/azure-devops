
name: CI Pipeline

on:
  push:
    paths:
      - 'code/**'
  pull_request:
    paths:
      - 'code/**'

permissions:
  checks: write
  pull-requests: write
  contents: read
    
jobs:
  # gitleaks:
  #   runs-on: ubuntu-latest
  #   steps:
  #     - name: Checkout code
  #       uses: actions/checkout@v4
  #     - name: Run Gitleaks to check for secrets
  #       uses: gitleaks/gitleaks-action@v2
  #       with:
  #         fail: true
  #         verbose: true
  #         report-format: sarif
  #         report-path: gitleaks.sarif
  #       continue-on-error: false
  build-and-test:
    runs-on: ubuntu-latest
    # needs: gitleaks
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      - name: Maven clean
        run: mvn clean
        working-directory: code
      - name: Maven compile
        run: mvn compile
        working-directory: code
      - name: Maven test
        run: mvn test
        working-directory: code
      - name: Upload Maven JUnit reports
        uses: actions/upload-artifact@v4
        with:
          name: maven-junit-reports
          path: code/target/surefire-reports/*.xml
      - name: Publish Maven JUnit results
        uses: dorny/test-reporter@v1
        with:
          name: Maven Tests
          path: code/target/surefire-reports/*.xml
          reporter: java-junit
      - name: Start Spring Boot with JaCoCo agent
        run: |
          nohup mvn spring-boot:run -Dspring-boot.run.jvmArguments="-javaagent:${HOME}/.m2/repository/org/jacoco/org.jacoco.agent/0.8.14/org.jacoco.agent-0.8.14-runtime.jar=destfile=target/jacoco-it.exec" > spring.log 2>&1 &
          for i in {1..60}; do
            if grep -q 'Started App' spring.log; then
              echo 'Spring Boot started.'
              break
            fi
            sleep 1
          done
          if ! grep -q 'Started App' spring.log; then
            echo 'Spring Boot did not start in time.'
            cat spring.log
            exit 1
          fi
        working-directory: code
      - name: Download Karate jar
        run: |
          curl -sSL -o karate.jar https://github.com/karatelabs/karate/releases/download/v1.5.2/karate-1.5.2.jar
        working-directory: code/karate-tests
      - name: Run Karate tests
        env:
          API_BASE_URL: http://localhost:8080
        run: |
          java -jar karate.jar --threads=128 --format=json,cucumber:json,junit:xml --tags ~@wip --tags ~@ignore .
        working-directory: code/karate-tests
      - name: Upload Karate JUnit reports
        uses: actions/upload-artifact@v4
        with:
          name: karate-junit-reports
          path: code/karate-tests/target/karate-reports/*.xml
      - name: Publish Karate JUnit results
        uses: dorny/test-reporter@v1
        with:
          name: Karate Tests
          path: code/karate-tests/target/karate-reports/*.xml
          reporter: java-junit
      - name: Stop Spring Boot
        run: pkill -f 'org.springframework.boot.loader.JarLauncher' || pkill -f 'spring-boot:run' || true
      - name: Merge JaCoCo exec files
        run: mvn jacoco:merge@merge
        working-directory: code
      - name: Generate JaCoCo report
        run: mvn jacoco:report -Djacoco.dataFile=target/jacoco-merged.exec
        working-directory: code
      - name: Debug JaCoCo XML
        run: |
          ls -lh code/target/site/jacoco/
          cat code/target/site/jacoco/jacoco.xml || echo "No XML found"
      - name: Upload JaCoCo HTML report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-html-report
          path: code/target/site/jacoco/

      - name: Cobertura Coverage Summary
        uses: PavanMudigonda/jacoco-reporter@v5.1
        with:
          coverage_results_path: code/target/site/jacoco/jacoco.xml
          coverage_report_name: Coverage
          coverage_report_title: JaCoCo
          github_token: ${{ secrets.GITHUB_TOKEN }}
          skip_check_run: false
          minimum_coverage: 80
          fail_below_threshold: false
          publish_only_summary: false

      - name: Add Jacocoo report to workflow run summary
        run: |
          echo "| Outcome | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| Code Coverage % | ${{ steps.jacoco_reporter.outputs.coverage_percentage }} |" >> $GITHUB_STEP_SUMMARY
          echo "| :heavy_check_mark: Number of Lines Covered | ${{ steps.jacoco_reporter.outputs.covered_lines }} |" >> $GITHUB_STEP_SUMMARY
          echo "| :x: Number of Lines Missed | ${{ steps.jacoco_reporter.outputs.missed_lines }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Total Number of Lines | ${{ steps.jacoco_reporter.outputs.total_lines }} |" >> $GITHUB_STEP_SUMMARY
          
      # uploads the coverage-report.md artifact  # Optional
      - name: Upload Code Coverage Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage-report-markdown
          path: code/target/site/jacoco//coverage-results.md 
          retention-days: 1  

  native-and-docker:
    runs-on: ubuntu-latest
    needs: build-and-test
    # if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Build native image
        run: mvn package -Pnative
        working-directory: code
      - name: Build Docker image
        run: docker build -t qindel/azure-course:latest .
        working-directory: code
