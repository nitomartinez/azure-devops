name: CD Pipeline

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.8

      - name: Terraform Apply
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
        run: terraform apply -auto-approve
        working-directory: terraform

      - name: Terraform Init
        run: terraform init
        working-directory: terraform

      - name: Get ACR Outputs
        id: tfoutputs_acr
        run: |
          echo "acr_login_server=$(terraform output -raw acr_login_server)" >> $GITHUB_ENV
          echo "acr_admin_username=$(terraform output -raw acr_admin_username)" >> $GITHUB_ENV
          echo "acr_admin_password=$(terraform output -raw acr_admin_password)" >> $GITHUB_ENV
        working-directory: terraform

      - name: Build Docker Image
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          cd code
          docker build -t qindel/azure-course:latest .

      - name: Docker Login & Push Image
        run: |
          chmod +x terraform/push_image.sh
          ./terraform/push_image.sh "$acr_login_server" "$acr_admin_username" "$acr_admin_password" "qindel/azure-course:latest"

      - name: Get Function App Output
        id: tfoutputs_func
        run: |
          echo "function_app_url=$(terraform output -raw function_app_url)" >> $GITHUB_ENV
        working-directory: terraform

      - name: Run Karate Tests against Azure Function
        env:
          API_BASE_URL: "https://${{ env.function_app_url }}"
        run: |
          cd code/karate-tests
          curl -sSL -o karate.jar https://github.com/karatelabs/karate/releases/download/v1.5.2/karate-1.5.2.jar
          java -jar karate.jar --threads=8 --format=json,cucumber:json,junit:xml --tags ~@wip --tags ~@ignore .

      - name: Terraform Destroy (Teardown)
        if: always()
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
        run: terraform destroy -auto-approve
        working-directory: terraform
