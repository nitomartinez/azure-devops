name: CD Pipeline

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed
    branches:
      - main

jobs:
  terraform:
    runs-on: ubuntu-latest
    environment: production
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.8

      - name: Clean Terraform cache
        run: rm -rf .terraform
        working-directory: terraform

      - name: Debug ARM environment variables
        run: |
          echo "ARM_CLIENT_ID=${ARM_CLIENT_ID}"
          echo "ARM_SUBSCRIPTION_ID=${ARM_SUBSCRIPTION_ID}"
          echo "ARM_TENANT_ID=${ARM_TENANT_ID}"
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
        working-directory: terraform
        
      - name: Terraform Init
        run: terraform init
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_USE_MSI: "false"
        working-directory: terraform

      - name: Terraform Apply
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
        run: terraform apply -auto-approve
        working-directory: terraform

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Build native image
        run: mvn package -Pnative
        working-directory: code
      - name: Build Docker image
        run: docker build -t qindel/azure-course:latest .
        working-directory: code

      - name: Get ACR Outputs and Function App URL
        id: tfoutputs_acr
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
        run: |
          export acr_login_server=$(terraform output -raw acr_login_server)
          export acr_admin_username=$(terraform output -raw acr_admin_username)
          export acr_admin_password=$(terraform output -raw acr_admin_password)
          export function_app_url=$(terraform output -raw function_app_url)
          echo function_app_url=${function_app_url} >> $GITHUB_ENV
          echo "ACR Login Server: $acr_login_server"
          echo "ACR Admin Username: $acr_admin_username"
          # Do not print the ACR Admin Password for security reasons
          # echo "ACR Admin Password: $acr_admin_password"
          echo "acr_login_server=${acr_login_server}" >> $GITHUB_ENV
          echo "acr_admin_username=${acr_admin_username}" >> $GITHUB_ENV
          echo "acr_admin_password=${acr_admin_password}" >> $GITHUB_ENV
          echo "function_app_url=${function_app_url}" >> $GITHUB_ENV
          chmod +x push_image.sh
          ./push_image.sh "$acr_login_server" "$acr_admin_username" "$acr_admin_password" "qindel/azure-course:latest"
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: Restart Azure Function App
        run: az functionapp restart --name pingservice --resource-group rg-devel-nito
        working-directory: terraform

      - name: Run Karate Tests against Azure Function
        env:
          API_BASE_URL: "https://${{ env.function_app_url }}"
        run: |
          cd code/karate-tests
          curl -sSL -o karate.jar https://github.com/karatelabs/karate/releases/download/v1.5.2/karate-1.5.2.jar
          java -jar karate.jar --threads=8 --format=json,cucumber:json,junit:xml --tags ~@wip --tags ~@ignore .

      - name: Publish Karate JUnit results
        uses: dorny/test-reporter@v1
        with:
          name: Karate Tests
          path: code/karate-tests/target/karate-reports/*.xml
          reporter: java-junit

      - name: Terraform Destroy (Teardown)
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
        run: terraform destroy -auto-approve
        working-directory: terraform
